name: Collect Repo Stats

on:
  schedule:
    - cron: '0 6 * * *'  # 06:00 UTC daily (16:00 AEST)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      # Single source of truth for what counts as a real "download" (a human
      # installing the app). Matches installer/package assets by extension,
      # case-insensitively. Auto-updater manifests (latest.json / latest*.yml),
      # detached signatures (.sig), electron diff blockmaps (.blockmap) and the
      # Tauri/electron update bundles (.tar.gz) are deliberately NOT installers —
      # they are fetched automatically and must not inflate the count.
      # NOTE: .zip is assumed to be an app package; a sample-data .zip attached to
      # a release would be counted (acceptable — see CLAUDE.md "Download counting").
      INSTALLER_REGEX: '\.(dmg|exe|msi|pkg|appimage|deb|rpm|zip)$'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Collect traffic and release data
        env:
          GH_TOKEN: ${{ secrets.GH_STATS_TOKEN }}
        run: |
          set -euo pipefail

          REPOS=("mrdavearms/bulk-pdf-extractor-and-generator" "mrdavearms/student-doc-redactor")
          TODAY=$(date -u +%Y-%m-%d)

          TRAFFIC_FILE="data/traffic.json"
          RELEASES_FILE="data/releases.json"

          # Initialize files if empty or missing
          if [ ! -s "$TRAFFIC_FILE" ]; then
            echo '{}' > "$TRAFFIC_FILE"
          fi
          if [ ! -s "$RELEASES_FILE" ]; then
            echo '{}' > "$RELEASES_FILE"
          fi

          for FULL_REPO in "${REPOS[@]}"; do
            REPO_NAME=$(echo "$FULL_REPO" | cut -d'/' -f2)
            echo "=== Collecting data for $REPO_NAME ==="

            # --- Traffic: Views ---
            echo "  Fetching views..."
            VIEWS=$(curl -sf -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${FULL_REPO}/traffic/views" || echo '{"views":[]}')

            # --- Traffic: Clones ---
            echo "  Fetching clones..."
            CLONES=$(curl -sf -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${FULL_REPO}/traffic/clones" || echo '{"clones":[]}')

            # --- Traffic: Referrers ---
            echo "  Fetching referrers..."
            REFERRERS=$(curl -sf -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${FULL_REPO}/traffic/popular/referrers" || echo '[]')

            # --- Traffic: Popular Paths ---
            echo "  Fetching popular paths..."
            PATHS=$(curl -sf -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${FULL_REPO}/traffic/popular/paths" || echo '[]')

            # --- Repo meta: stars, forks, watchers (subscribers) ---
            # One call to the repo object gives all three engagement counters.
            # NOTE: the API's "watchers_count" is a legacy alias of stars; the real
            # "Watch" count is "subscribers_count".
            echo "  Fetching repo meta (stars/forks/watchers)..."
            REPO_JSON=$(curl -sf -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${FULL_REPO}" || echo '{}')
            STARS=$(echo "$REPO_JSON" | jq '.stargazers_count // 0')
            FORKS=$(echo "$REPO_JSON" | jq '.forks_count // 0')
            WATCHERS=$(echo "$REPO_JSON" | jq '.subscribers_count // 0')

            # --- Star events (when each user starred) ---
            # The star+json media type adds a "starred_at" timestamp per stargazer.
            # One page of 100 is plenty for these low-star repos.
            echo "  Fetching stargazers (with timestamps)..."
            STARGAZERS=$(curl -sf -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github.star+json" \
              "https://api.github.com/repos/${FULL_REPO}/stargazers?per_page=100" || echo '[]')

            # --- Merge views into traffic.json ---
            EXISTING=$(cat "$TRAFFIC_FILE")
            EXISTING=$(echo "$EXISTING" | jq --arg repo "$REPO_NAME" '
              if .[$repo] == null then
                .[$repo] = {"views":[],"clones":[],"referrers":[],"popular_paths":[],"stars":[],"forks":[],"watchers":[],"star_events":[]}
              else
                .[$repo].stars = (.[$repo].stars // [])
                | .[$repo].forks = (.[$repo].forks // [])
                | .[$repo].watchers = (.[$repo].watchers // [])
                | .[$repo].star_events = (.[$repo].star_events // [])
              end
            ')

            # Merge daily views (deduplicate by date, keep latest)
            EXISTING=$(echo "$EXISTING" | jq --arg repo "$REPO_NAME" --argjson new_views "$VIEWS" '
              .[$repo].views = (
                [.[$repo].views[], ($new_views.views // [] | .[] | {
                  date: (.timestamp | split("T")[0]),
                  total: .count,
                  unique: .uniques
                })]
                | group_by(.date)
                | map(last)
                | sort_by(.date)
              )
            ')

            # Merge daily clones (deduplicate by date, keep latest)
            EXISTING=$(echo "$EXISTING" | jq --arg repo "$REPO_NAME" --argjson new_clones "$CLONES" '
              .[$repo].clones = (
                [.[$repo].clones[], ($new_clones.clones // [] | .[] | {
                  date: (.timestamp | split("T")[0]),
                  total: .count,
                  unique: .uniques
                })]
                | group_by(.date)
                | map(last)
                | sort_by(.date)
              )
            ')

            # Store today's referrer snapshot (replace if same date)
            EXISTING=$(echo "$EXISTING" | jq --arg repo "$REPO_NAME" --arg today "$TODAY" --argjson refs "$REFERRERS" '
              .[$repo].referrers = (
                [(.[$repo].referrers // [] | .[] | select(.date != $today)),
                 {date: $today, sources: ($refs | map({referrer, count: (.count // 0), unique: (.uniques // 0)}))}]
                | sort_by(.date)
              )
            ')

            # Store today's popular paths snapshot (replace if same date)
            EXISTING=$(echo "$EXISTING" | jq --arg repo "$REPO_NAME" --arg today "$TODAY" --argjson paths "$PATHS" '
              .[$repo].popular_paths = (
                [(.[$repo].popular_paths // [] | .[] | select(.date != $today)),
                 {date: $today, paths: ($paths | map({path, count: .count, unique: .uniques}))}]
                | sort_by(.date)
              )
            ')

            # Store today's star count (replace if same date)
            EXISTING=$(echo "$EXISTING" | jq --arg repo "$REPO_NAME" --arg today "$TODAY" --argjson stars "$STARS" '
              .[$repo].stars = (
                [(.[$repo].stars // [] | .[] | select(.date != $today)),
                 {date: $today, count: $stars}]
                | sort_by(.date)
              )
            ')

            # Store today's fork count (replace if same date)
            EXISTING=$(echo "$EXISTING" | jq --arg repo "$REPO_NAME" --arg today "$TODAY" --argjson forks "$FORKS" '
              .[$repo].forks = (
                [(.[$repo].forks // [] | .[] | select(.date != $today)),
                 {date: $today, count: $forks}]
                | sort_by(.date)
              )
            ')

            # Store today's watcher (subscriber) count (replace if same date)
            EXISTING=$(echo "$EXISTING" | jq --arg repo "$REPO_NAME" --arg today "$TODAY" --argjson watchers "$WATCHERS" '
              .[$repo].watchers = (
                [(.[$repo].watchers // [] | .[] | select(.date != $today)),
                 {date: $today, count: $watchers}]
                | sort_by(.date)
              )
            ')

            # Merge star events (one row per stargazer: when they starred + who).
            # Dedup by login (keep latest seen), so re-runs never duplicate. Stargazers
            # of a public repo are already public, so storing the login is not a leak.
            EXISTING=$(echo "$EXISTING" | jq --arg repo "$REPO_NAME" --argjson sg "$STARGAZERS" '
              .[$repo].star_events = (
                ([.[$repo].star_events // [] | .[]]
                 + [$sg | if type == "array" then .[] else empty end
                      | select(.starred_at != null)
                      | {date: (.starred_at | split("T")[0]), login: (.user.login // "")}])
                | group_by(.login)
                | map(last)
                | sort_by(.date)
              )
            ')

            echo "$EXISTING" > "$TRAFFIC_FILE"

            # --- Releases ---
            echo "  Fetching releases..."
            RELEASES=$(curl -sf -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${FULL_REPO}/releases" || echo '[]')

            EXISTING_REL=$(cat "$RELEASES_FILE")
            if ! echo "$EXISTING_REL" | jq -e --arg repo "$REPO_NAME" '.[$repo]' > /dev/null 2>&1; then
              EXISTING_REL=$(echo "$EXISTING_REL" | jq --arg repo "$REPO_NAME" '.[$repo] = {"releases":[],"history":[]}')
            fi

            # Build current release snapshot
            RELEASE_DATA=$(echo "$RELEASES" | jq '[.[] | {
              tag: .tag_name,
              name: .name,
              published_at: .published_at,
              assets: [.assets[] | {
                name: .name,
                download_count: .download_count,
                size_bytes: .size
              }]
            }]')

            # Calculate total downloads across all releases
            TOTAL_DL=$(echo "$RELEASE_DATA" | jq --arg re "$INSTALLER_REGEX" '[.[].assets[] | select((.name // "") | test($re; "i")) | .download_count] | add // 0')

            # Update releases and history
            EXISTING_REL=$(echo "$EXISTING_REL" | jq \
              --arg repo "$REPO_NAME" \
              --argjson rel "$RELEASE_DATA" \
              --argjson total "$TOTAL_DL" \
              --arg re "$INSTALLER_REGEX" \
              --arg today "$TODAY" '
              .[$repo].releases = $rel |
              .[$repo].history = (
                [(.[$repo].history // [] | .[] | select(.date != $today)),
                 {date: $today, total_downloads: $total}]
                | sort_by(.date)
              ) |
              .[$repo].asset_history = (
                [(.[$repo].asset_history // [] | .[] | select(.date != $today)),
                 {date: $today, assets: [$rel[].assets[]
                    | select((.name // "") | test($re; "i"))
                    | {name, download_count}]}]
                | sort_by(.date)
              )
            ')

            echo "$EXISTING_REL" > "$RELEASES_FILE"

            echo "  Done with $REPO_NAME"
          done

          # Pretty-print the JSON files
          jq '.' "$TRAFFIC_FILE" > tmp.json && mv tmp.json "$TRAFFIC_FILE"
          jq '.' "$RELEASES_FILE" > tmp.json && mv tmp.json "$RELEASES_FILE"

          echo "=== Collection complete ==="

      - name: Check token expiry
        id: token_check
        env:
          GH_TOKEN: ${{ secrets.GH_STATS_TOKEN }}
        run: |
          # Make an API call and capture the token expiry header
          EXPIRY_HEADER=$(curl -sI -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/rate_limit" | grep -i "github-authentication-token-expiration" | tr -d '\r')

          if [ -n "$EXPIRY_HEADER" ]; then
            # Header format: github-authentication-token-expiration: 2027-03-18 06:00:00 UTC
            EXPIRY_DATE=$(echo "$EXPIRY_HEADER" | sed 's/.*: //' | cut -d' ' -f1)
            TODAY=$(date -u +%Y-%m-%d)
            EXPIRY_EPOCH=$(date -d "$EXPIRY_DATE" +%s 2>/dev/null || date -j -f "%Y-%m-%d" "$EXPIRY_DATE" +%s 2>/dev/null || echo "0")
            TODAY_EPOCH=$(date -u +%s)
            DAYS_LEFT=$(( (EXPIRY_EPOCH - TODAY_EPOCH) / 86400 ))

            echo "Token expires: $EXPIRY_DATE ($DAYS_LEFT days remaining)"
            echo "days_left=$DAYS_LEFT" >> "$GITHUB_OUTPUT"
            echo "expiry_date=$EXPIRY_DATE" >> "$GITHUB_OUTPUT"

            if [ "$DAYS_LEFT" -le 30 ]; then
              echo "warning=true" >> "$GITHUB_OUTPUT"
            else
              echo "warning=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "Could not determine token expiry (token may not have an expiration)"
            echo "days_left=-1" >> "$GITHUB_OUTPUT"
            echo "expiry_date=none" >> "$GITHUB_OUTPUT"
            echo "warning=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update stats data for $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Send daily email summary
        if: env.GMAIL_ADDRESS != '' && env.GMAIL_APP_PASSWORD != ''
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GH_TOKEN: ${{ secrets.GH_STATS_TOKEN }}
          TOKEN_DAYS_LEFT: ${{ steps.token_check.outputs.days_left }}
          TOKEN_EXPIRY_DATE: ${{ steps.token_check.outputs.expiry_date }}
          TOKEN_WARNING: ${{ steps.token_check.outputs.warning }}
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          DISPLAY_DATE=$(date -u +"%d %b %Y")

          REPO_ROWS=""
          YESTERDAY=$(date -u -d "1 day ago" +%Y-%m-%d 2>/dev/null || date -u -v-1d +%Y-%m-%d)
          WEEK_AGO=$(date -u -d "7 days ago" +%Y-%m-%d 2>/dev/null || date -u -v-7d +%Y-%m-%d)
          TWO_WEEKS_AGO=$(date -u -d "14 days ago" +%Y-%m-%d 2>/dev/null || date -u -v-14d +%Y-%m-%d)

          # Coloured up/down trend span from this-week vs last-week view totals (empty if no prior week).
          trend_html() {
            local this_week="$1" last_week="$2" pct
            if [ "$last_week" -gt 0 ] 2>/dev/null; then
              pct=$(( (this_week - last_week) * 100 / last_week ))
              if [ "$pct" -ge 0 ]; then
                printf '<span style="color:#3fb950;">&#9650; +%s%%</span> vs last week' "$pct"
              else
                printf '<span style="color:#f85149;">&#9660; %s%%</span> vs last week' "$pct"
              fi
            fi
          }

          # Coloured download delta (new installs since the previous snapshot).
          dl_delta_html() {
            local delta="$1"
            if [ "$delta" -gt 0 ] 2>/dev/null; then
              printf '<span style="color:#3fb950;">&#9650; +%s today</span>' "$delta"
            elif [ "$delta" -lt 0 ] 2>/dev/null; then
              printf '<span style="color:#f85149;">&#9660; %s today</span>' "$delta"
            else
              printf 'no change today'
            fi
          }

          # Build the muted "Top sources / Top pages" line from a JSON array.
          # $1 = field name (referrer|path), $2 = JSON array of {<field>,count,...}
          top3_line() {
            echo "$2" | jq -r --arg k "$1" '
              if (type == "array" and length > 0) then
                (sort_by(-(.count // 0))[:3] | map("\(.[$k]) (\(.count))") | join(", "))
              else "&mdash;" end' 2>/dev/null || echo "&mdash;"
          }

          # Append one repo's HTML card to REPO_ROWS. Positional args:
          #   1 label  2 meta_text (stars/forks/watching)
          #   3 views_yday  4 views_yday_unique  5 clones_yday  6 clones_yday_unique
          #   7 downloads  8 dl_sub_html (delta or "all time")
          #   9 summary_html (left cell, may contain <br>)  10 trend_span
          #   11 ref_line  12 path_line
          build_repo_row() {
            local label="$1" meta="$2" vy="$3" vyu="$4" cy="$5" cyu="$6" \
                  dl="$7" dl_sub="$8" summary="$9" trend="${10}" ref_line="${11}" path_line="${12}"
            REPO_ROWS="${REPO_ROWS}
            <tr><td colspan=\"3\" style=\"padding:16px 0 8px 0;border-bottom:none;\">
              <strong style=\"font-size:16px;color:#e6edf3;\">${label}</strong>
              <span style=\"color:#8b949e;font-size:13px;margin-left:8px;\">${meta}</span>
            </td></tr>
            <tr style=\"background:#161b22;\">
              <td style=\"padding:10px 14px;border-radius:6px 0 0 0;\">
                <div style=\"color:#8b949e;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;\">Views (yesterday)</div>
                <div style=\"font-size:22px;font-weight:700;color:#58a6ff;\">${vy}</div>
                <div style=\"color:#8b949e;font-size:12px;\">${vyu} unique</div>
              </td>
              <td style=\"padding:10px 14px;\">
                <div style=\"color:#8b949e;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;\">Clones (yesterday)</div>
                <div style=\"font-size:22px;font-weight:700;color:#3fb950;\">${cy}</div>
                <div style=\"color:#8b949e;font-size:12px;\">${cyu} unique</div>
              </td>
              <td style=\"padding:10px 14px;border-radius:0 6px 0 0;\">
                <div style=\"color:#8b949e;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;\">Downloads</div>
                <div style=\"font-size:22px;font-weight:700;color:#d2a8ff;\">${dl}</div>
                <div style=\"color:#8b949e;font-size:12px;\">${dl_sub}</div>
              </td>
            </tr>
            <tr style=\"background:#161b22;\">
              <td colspan=\"2\" style=\"padding:6px 14px 8px;color:#8b949e;font-size:12px;line-height:1.6;\">
                ${summary}
              </td>
              <td style=\"padding:6px 14px 8px;color:#8b949e;font-size:12px;text-align:right;vertical-align:bottom;\">
                ${trend}
              </td>
            </tr>
            <tr style=\"background:#161b22;\">
              <td colspan=\"3\" style=\"padding:0 14px 10px;border-radius:0 0 6px 6px;color:#8b949e;font-size:12px;line-height:1.7;\">
                <span style=\"color:#6e7681;\">Top sources:</span> ${ref_line}<br>
                <span style=\"color:#6e7681;\">Top pages:</span> ${path_line}
              </td>
            </tr>
            <tr><td colspan=\"3\" style=\"padding:4px;border-bottom:none;\"></td></tr>"
          }

          # Public repos: read from the committed data/*.json files.
          for REPO_NAME in "bulk-pdf-extractor-and-generator" "student-doc-redactor"; do
            if [ "$REPO_NAME" = "bulk-pdf-extractor-and-generator" ]; then
              LABEL="Bulk PDF Extractor"
            else
              LABEL="Student Doc Redactor"
            fi

            # Yesterday = last COMPLETE UTC day (today's bucket is partial + lags, so it
            # reads ~0 and is misleading; yesterday is the most recent reliable daily figure).
            YDAY_VIEWS=$(jq -r --arg repo "$REPO_NAME" --arg d "$YESTERDAY" '(.[$repo].views[] | select(.date == $d) | .total) // 0' data/traffic.json)
            YDAY_VIEWS_U=$(jq -r --arg repo "$REPO_NAME" --arg d "$YESTERDAY" '(.[$repo].views[] | select(.date == $d) | .unique) // 0' data/traffic.json)
            YDAY_CLONES=$(jq -r --arg repo "$REPO_NAME" --arg d "$YESTERDAY" '(.[$repo].clones[] | select(.date == $d) | .total) // 0' data/traffic.json)
            YDAY_CLONES_U=$(jq -r --arg repo "$REPO_NAME" --arg d "$YESTERDAY" '(.[$repo].clones[] | select(.date == $d) | .unique) // 0' data/traffic.json)

            # Rolling 7-day windows
            VIEWS_7D=$(jq -r --arg repo "$REPO_NAME" --arg from "$WEEK_AGO" '[.[$repo].views[] | select(.date >= $from) | .total] | add // 0' data/traffic.json)
            VIEWS_7D_U=$(jq -r --arg repo "$REPO_NAME" --arg from "$WEEK_AGO" '[.[$repo].views[] | select(.date >= $from) | .unique] | add // 0' data/traffic.json)
            CLONES_7D=$(jq -r --arg repo "$REPO_NAME" --arg from "$WEEK_AGO" '[.[$repo].clones[] | select(.date >= $from) | .total] | add // 0' data/traffic.json)

            DOWNLOADS=$(jq -r --arg repo "$REPO_NAME" '(.[$repo].history | last | .total_downloads) // 0' data/releases.json)
            DL_DELTA=$(jq -r --arg repo "$REPO_NAME" '(.[$repo].history // []) as $h | if ($h | length) >= 2 then ($h[-1].total_downloads - $h[-2].total_downloads) else 0 end' data/releases.json)
            TOTAL_VIEWS=$(jq -r --arg repo "$REPO_NAME" '[.[$repo].views[].total] | add // 0' data/traffic.json)
            TOTAL_UNIQUE=$(jq -r --arg repo "$REPO_NAME" '[.[$repo].views[].unique] | add // 0' data/traffic.json)
            STAR_COUNT=$(jq -r --arg repo "$REPO_NAME" '(.[$repo].stars | last | .count) // 0' data/traffic.json)
            FORK_COUNT=$(jq -r --arg repo "$REPO_NAME" '(.[$repo].forks | last | .count) // 0' data/traffic.json)
            WATCH_COUNT=$(jq -r --arg repo "$REPO_NAME" '(.[$repo].watchers | last | .count) // 0' data/traffic.json)
            THIS_WEEK="$VIEWS_7D"
            LAST_WEEK=$(jq -r --arg repo "$REPO_NAME" --arg from "$TWO_WEEKS_AGO" --arg to "$WEEK_AGO" '[.[$repo].views[] | select(.date >= $from and .date < $to) | .total] | add // 0' data/traffic.json)

            REFS_JSON=$(jq -c --arg repo "$REPO_NAME" '((.[$repo].referrers // []) | last | .sources?) // []' data/traffic.json)
            PATHS_JSON=$(jq -c --arg repo "$REPO_NAME" '((.[$repo].popular_paths // []) | last | .paths?) // []' data/traffic.json)
            REF_LINE=$(top3_line referrer "$REFS_JSON")
            PATH_LINE=$(top3_line path "$PATHS_JSON")

            META="${STAR_COUNT} stars &middot; ${FORK_COUNT} forks &middot; ${WATCH_COUNT} watching"
            SUMMARY="Last 7d: ${VIEWS_7D} views (${VIEWS_7D_U} unique) &middot; ${CLONES_7D} clones<br>All-time: ${TOTAL_VIEWS} views (${TOTAL_UNIQUE} unique)"

            build_repo_row "$LABEL" "$META" "$YDAY_VIEWS" "$YDAY_VIEWS_U" "$YDAY_CLONES" "$YDAY_CLONES_U" "$DOWNLOADS" "$(dl_delta_html "$DL_DELTA")" "$SUMMARY" "$(trend_html "$THIS_WEEK" "$LAST_WEEK")" "$REF_LINE" "$PATH_LINE"
          done

          # --- NAPLAN Cohort Tracker (private repo) ---
          # Fetched fresh from the API at send time and NEVER persisted to the public
          # data/*.json files, so its numbers stay private. View history is therefore
          # limited to GitHub's rolling 14-day traffic window. If any fetch fails
          # (e.g. the token lacks 'repo' scope) we emit a visible warning row rather
          # than silently reporting zeros that look like a quiet traffic day.
          NAPLAN_REPO="mrdavearms/naplan-cohort-tracker"
          NAPLAN_OK=1
          N_VIEWS=$(curl -sf -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${NAPLAN_REPO}/traffic/views") || NAPLAN_OK=0
          N_CLONES=$(curl -sf -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${NAPLAN_REPO}/traffic/clones") || NAPLAN_OK=0
          N_RELEASES=$(curl -sf -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${NAPLAN_REPO}/releases") || NAPLAN_OK=0
          N_REPO=$(curl -sf -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${NAPLAN_REPO}") || NAPLAN_OK=0
          N_REFS=$(curl -sf -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${NAPLAN_REPO}/traffic/popular/referrers") || NAPLAN_OK=0
          N_PATHS=$(curl -sf -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${NAPLAN_REPO}/traffic/popular/paths") || NAPLAN_OK=0

          if [ "$NAPLAN_OK" -eq 1 ]; then
            YDAY_VIEWS=$(echo "$N_VIEWS" | jq -r --arg d "$YESTERDAY" '[.views[] | select((.timestamp|split("T")[0]) == $d) | .count] | add // 0')
            YDAY_VIEWS_U=$(echo "$N_VIEWS" | jq -r --arg d "$YESTERDAY" '[.views[] | select((.timestamp|split("T")[0]) == $d) | .uniques] | add // 0')
            YDAY_CLONES=$(echo "$N_CLONES" | jq -r --arg d "$YESTERDAY" '[.clones[] | select((.timestamp|split("T")[0]) == $d) | .count] | add // 0')
            YDAY_CLONES_U=$(echo "$N_CLONES" | jq -r --arg d "$YESTERDAY" '[.clones[] | select((.timestamp|split("T")[0]) == $d) | .uniques] | add // 0')
            VIEWS_7D=$(echo "$N_VIEWS" | jq -r --arg from "$WEEK_AGO" '[.views[] | select((.timestamp|split("T")[0]) >= $from) | .count] | add // 0')
            VIEWS_7D_U=$(echo "$N_VIEWS" | jq -r --arg from "$WEEK_AGO" '[.views[] | select((.timestamp|split("T")[0]) >= $from) | .uniques] | add // 0')
            CLONES_7D=$(echo "$N_CLONES" | jq -r --arg from "$WEEK_AGO" '[.clones[] | select((.timestamp|split("T")[0]) >= $from) | .count] | add // 0')
            DOWNLOADS=$(echo "$N_RELEASES" | jq -r --arg re "$INSTALLER_REGEX" '[.[].assets[] | select((.name // "") | test($re; "i")) | .download_count] | add // 0')
            TOTAL_VIEWS=$(echo "$N_VIEWS" | jq -r '.count // 0')
            TOTAL_UNIQUE=$(echo "$N_VIEWS" | jq -r '.uniques // 0')
            STAR_COUNT=$(echo "$N_REPO" | jq -r '.stargazers_count // 0')
            FORK_COUNT=$(echo "$N_REPO" | jq -r '.forks_count // 0')
            WATCH_COUNT=$(echo "$N_REPO" | jq -r '.subscribers_count // 0')
            THIS_WEEK="$VIEWS_7D"
            LAST_WEEK=$(echo "$N_VIEWS" | jq -r --arg from "$TWO_WEEKS_AGO" --arg to "$WEEK_AGO" '[.views[] | select((.timestamp|split("T")[0]) >= $from and (.timestamp|split("T")[0]) < $to) | .count] | add // 0')
            REF_LINE=$(top3_line referrer "$N_REFS")
            PATH_LINE=$(top3_line path "$N_PATHS")

            META="${STAR_COUNT} stars &middot; ${FORK_COUNT} forks &middot; ${WATCH_COUNT} watching &middot; private"
            SUMMARY="Last 7d: ${VIEWS_7D} views (${VIEWS_7D_U} unique) &middot; ${CLONES_7D} clones<br>Last 14 days: ${TOTAL_VIEWS} views (${TOTAL_UNIQUE} unique)"

            build_repo_row "NAPLAN Cohort Tracker" "$META" "$YDAY_VIEWS" "$YDAY_VIEWS_U" "$YDAY_CLONES" "$YDAY_CLONES_U" "$DOWNLOADS" "all time" "$SUMMARY" "$(trend_html "$THIS_WEEK" "$LAST_WEEK")" "$REF_LINE" "$PATH_LINE"
          else
            echo "WARNING: could not fetch stats for ${NAPLAN_REPO} (token scope or network?)" >&2
            REPO_ROWS="${REPO_ROWS}
            <tr><td colspan=\"3\" style=\"padding:16px 0 8px 0;border-bottom:none;\">
              <strong style=\"font-size:16px;color:#e6edf3;\">NAPLAN Cohort Tracker</strong>
              <span style=\"color:#8b949e;font-size:13px;margin-left:8px;\">private</span>
            </td></tr>
            <tr><td colspan=\"3\" style=\"padding:12px 14px;background:#bb800922;border:1px solid #bb8009;border-radius:6px;color:#d29922;font-size:13px;\">
              &#9888; Couldn't fetch stats. Check that <strong>GH_STATS_TOKEN</strong> has full <strong>repo</strong> scope (required to read private repos).
            </td></tr>
            <tr><td colspan=\"3\" style=\"padding:4px;border-bottom:none;\"></td></tr>"
          fi

          # Token warning banner
          TOKEN_BANNER=""
          if [ "$TOKEN_WARNING" = "true" ]; then
            TOKEN_BANNER="<tr><td colspan=\"3\" style=\"padding:12px 14px;background:#f8514922;border:1px solid #f85149;border-radius:6px;color:#f85149;font-size:13px;\">
              <strong>Token Expiry Warning</strong><br>
              Your GH_STATS_TOKEN expires on ${TOKEN_EXPIRY_DATE} (${TOKEN_DAYS_LEFT} days remaining).<br>
              <a href=\"https://github.com/settings/tokens\" style=\"color:#58a6ff;\">Rotate token</a> then
              <a href=\"https://github.com/mrdavearms/repo-stats/settings/secrets/actions\" style=\"color:#58a6ff;\">update the secret</a>.
            </td></tr>
            <tr><td colspan=\"3\" style=\"padding:4px;border-bottom:none;\"></td></tr>"
          fi

          # Build full HTML email body
          HTML_BODY="<!DOCTYPE html><html><body style=\"margin:0;padding:0;background:#0d1117;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;\"><table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"background:#0d1117;padding:20px;\"><tr><td align=\"center\"><table width=\"600\" cellpadding=\"0\" cellspacing=\"0\" style=\"background:#0d1117;\"><tr><td style=\"padding:0 0 16px 0;border-bottom:1px solid #30363d;\"><span style=\"font-size:20px;font-weight:600;color:#e6edf3;\">Repo Stats</span><span style=\"float:right;color:#8b949e;font-size:13px;line-height:28px;\">${DISPLAY_DATE}</span></td></tr>${TOKEN_BANNER}${REPO_ROWS}<tr><td colspan=\"3\" style=\"padding:16px 0 0 0;text-align:center;\"><a href=\"https://mrdavearms.github.io/repo-stats/\" style=\"display:inline-block;padding:8px 20px;background:#58a6ff;color:#fff;text-decoration:none;border-radius:6px;font-size:13px;font-weight:600;\">View Dashboard</a></td></tr></table></td></tr></table></body></html>"

          # Assemble email with headers
          {
            printf 'From: Repo Stats <%s>\r\n' "$GMAIL_ADDRESS"
            printf 'To: %s\r\n' "$GMAIL_ADDRESS"
            printf 'Subject: Repo Stats %s\r\n' "$DISPLAY_DATE"
            printf 'MIME-Version: 1.0\r\n'
            printf 'Content-Type: text/html; charset=UTF-8\r\n'
            printf '\r\n'
            printf '%s' "$HTML_BODY"
          } > /tmp/email.txt

          # Send via Gmail SMTP
          curl -s --url "smtps://smtp.gmail.com:465" \
            --ssl-reqd \
            --mail-from "$GMAIL_ADDRESS" \
            --mail-rcpt "$GMAIL_ADDRESS" \
            --user "${GMAIL_ADDRESS}:${GMAIL_APP_PASSWORD}" \
            -T /tmp/email.txt

          echo "Email sent to $GMAIL_ADDRESS"
