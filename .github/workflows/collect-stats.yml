name: Collect Repo Stats

on:
  schedule:
    - cron: '0 6 * * *'  # 06:00 UTC daily (16:00 AEST)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Collect traffic and release data
        env:
          GH_TOKEN: ${{ secrets.GH_STATS_TOKEN }}
        run: |
          set -euo pipefail

          REPOS=("mrdavearms/bulk-pdf-extractor-and-generator" "mrdavearms/student-doc-redactor")
          TODAY=$(date -u +%Y-%m-%d)

          TRAFFIC_FILE="data/traffic.json"
          RELEASES_FILE="data/releases.json"

          # Initialize files if empty or missing
          if [ ! -s "$TRAFFIC_FILE" ]; then
            echo '{}' > "$TRAFFIC_FILE"
          fi
          if [ ! -s "$RELEASES_FILE" ]; then
            echo '{}' > "$RELEASES_FILE"
          fi

          for FULL_REPO in "${REPOS[@]}"; do
            REPO_NAME=$(echo "$FULL_REPO" | cut -d'/' -f2)
            echo "=== Collecting data for $REPO_NAME ==="

            # --- Traffic: Views ---
            echo "  Fetching views..."
            VIEWS=$(curl -sf -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${FULL_REPO}/traffic/views" || echo '{"views":[]}')

            # --- Traffic: Clones ---
            echo "  Fetching clones..."
            CLONES=$(curl -sf -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${FULL_REPO}/traffic/clones" || echo '{"clones":[]}')

            # --- Traffic: Referrers ---
            echo "  Fetching referrers..."
            REFERRERS=$(curl -sf -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${FULL_REPO}/traffic/popular/referrers" || echo '[]')

            # --- Traffic: Popular Paths ---
            echo "  Fetching popular paths..."
            PATHS=$(curl -sf -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${FULL_REPO}/traffic/popular/paths" || echo '[]')

            # --- Stars ---
            echo "  Fetching star count..."
            STARS=$(curl -sf -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${FULL_REPO}" | jq '.stargazers_count // 0')

            # --- Merge views into traffic.json ---
            EXISTING=$(cat "$TRAFFIC_FILE")
            EXISTING=$(echo "$EXISTING" | jq --arg repo "$REPO_NAME" '
              if .[$repo] == null then
                .[$repo] = {"views":[],"clones":[],"referrers":[],"popular_paths":[],"stars":[]}
              else
                if .[$repo].stars == null then .[$repo].stars = [] else . end
              end
            ')

            # Merge daily views (deduplicate by date, keep latest)
            EXISTING=$(echo "$EXISTING" | jq --arg repo "$REPO_NAME" --argjson new_views "$VIEWS" '
              .[$repo].views = (
                [.[$repo].views[], ($new_views.views // [] | .[] | {
                  date: (.timestamp | split("T")[0]),
                  total: .count,
                  unique: .uniques
                })]
                | group_by(.date)
                | map(last)
                | sort_by(.date)
              )
            ')

            # Merge daily clones (deduplicate by date, keep latest)
            EXISTING=$(echo "$EXISTING" | jq --arg repo "$REPO_NAME" --argjson new_clones "$CLONES" '
              .[$repo].clones = (
                [.[$repo].clones[], ($new_clones.clones // [] | .[] | {
                  date: (.timestamp | split("T")[0]),
                  total: .count,
                  unique: .uniques
                })]
                | group_by(.date)
                | map(last)
                | sort_by(.date)
              )
            ')

            # Store today's referrer snapshot (replace if same date)
            EXISTING=$(echo "$EXISTING" | jq --arg repo "$REPO_NAME" --arg today "$TODAY" --argjson refs "$REFERRERS" '
              .[$repo].referrers = (
                [(.[$repo].referrers // [] | .[] | select(.date != $today)),
                 {date: $today, sources: ($refs | map({referrer, count: (.count // 0), unique: (.unique // 0)}))}]
                | sort_by(.date)
              )
            ')

            # Store today's popular paths snapshot (replace if same date)
            EXISTING=$(echo "$EXISTING" | jq --arg repo "$REPO_NAME" --arg today "$TODAY" --argjson paths "$PATHS" '
              .[$repo].popular_paths = (
                [(.[$repo].popular_paths // [] | .[] | select(.date != $today)),
                 {date: $today, paths: ($paths | map({path, count: .count, unique: .uniques}))}]
                | sort_by(.date)
              )
            ')

            # Store today's star count (replace if same date)
            EXISTING=$(echo "$EXISTING" | jq --arg repo "$REPO_NAME" --arg today "$TODAY" --argjson stars "$STARS" '
              .[$repo].stars = (
                [(.[$repo].stars // [] | .[] | select(.date != $today)),
                 {date: $today, count: $stars}]
                | sort_by(.date)
              )
            ')

            echo "$EXISTING" > "$TRAFFIC_FILE"

            # --- Releases ---
            echo "  Fetching releases..."
            RELEASES=$(curl -sf -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${FULL_REPO}/releases" || echo '[]')

            EXISTING_REL=$(cat "$RELEASES_FILE")
            if ! echo "$EXISTING_REL" | jq -e --arg repo "$REPO_NAME" '.[$repo]' > /dev/null 2>&1; then
              EXISTING_REL=$(echo "$EXISTING_REL" | jq --arg repo "$REPO_NAME" '.[$repo] = {"releases":[],"history":[]}')
            fi

            # Build current release snapshot
            RELEASE_DATA=$(echo "$RELEASES" | jq '[.[] | {
              tag: .tag_name,
              name: .name,
              published_at: .published_at,
              assets: [.assets[] | {
                name: .name,
                download_count: .download_count,
                size_bytes: .size
              }]
            }]')

            # Calculate total downloads across all releases
            TOTAL_DL=$(echo "$RELEASE_DATA" | jq '[.[].assets[].download_count] | add // 0')

            # Update releases and history
            EXISTING_REL=$(echo "$EXISTING_REL" | jq \
              --arg repo "$REPO_NAME" \
              --argjson rel "$RELEASE_DATA" \
              --argjson total "$TOTAL_DL" \
              --arg today "$TODAY" '
              .[$repo].releases = $rel |
              .[$repo].history = (
                [(.[$repo].history // [] | .[] | select(.date != $today)),
                 {date: $today, total_downloads: $total}]
                | sort_by(.date)
              )
            ')

            echo "$EXISTING_REL" > "$RELEASES_FILE"

            echo "  Done with $REPO_NAME"
          done

          # Pretty-print the JSON files
          jq '.' "$TRAFFIC_FILE" > tmp.json && mv tmp.json "$TRAFFIC_FILE"
          jq '.' "$RELEASES_FILE" > tmp.json && mv tmp.json "$RELEASES_FILE"

          echo "=== Collection complete ==="

      - name: Check token expiry
        id: token_check
        env:
          GH_TOKEN: ${{ secrets.GH_STATS_TOKEN }}
        run: |
          # Make an API call and capture the token expiry header
          EXPIRY_HEADER=$(curl -sI -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/rate_limit" | grep -i "github-authentication-token-expiration" | tr -d '\r')

          if [ -n "$EXPIRY_HEADER" ]; then
            # Header format: github-authentication-token-expiration: 2027-03-18 06:00:00 UTC
            EXPIRY_DATE=$(echo "$EXPIRY_HEADER" | sed 's/.*: //' | cut -d' ' -f1)
            TODAY=$(date -u +%Y-%m-%d)
            EXPIRY_EPOCH=$(date -d "$EXPIRY_DATE" +%s 2>/dev/null || date -j -f "%Y-%m-%d" "$EXPIRY_DATE" +%s 2>/dev/null || echo "0")
            TODAY_EPOCH=$(date -u +%s)
            DAYS_LEFT=$(( (EXPIRY_EPOCH - TODAY_EPOCH) / 86400 ))

            echo "Token expires: $EXPIRY_DATE ($DAYS_LEFT days remaining)"
            echo "days_left=$DAYS_LEFT" >> "$GITHUB_OUTPUT"
            echo "expiry_date=$EXPIRY_DATE" >> "$GITHUB_OUTPUT"

            if [ "$DAYS_LEFT" -le 30 ]; then
              echo "warning=true" >> "$GITHUB_OUTPUT"
            else
              echo "warning=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "Could not determine token expiry (token may not have an expiration)"
            echo "days_left=-1" >> "$GITHUB_OUTPUT"
            echo "expiry_date=none" >> "$GITHUB_OUTPUT"
            echo "warning=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update stats data for $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Send daily email summary
        if: env.GMAIL_ADDRESS != '' && env.GMAIL_APP_PASSWORD != ''
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TOKEN_DAYS_LEFT: ${{ steps.token_check.outputs.days_left }}
          TOKEN_EXPIRY_DATE: ${{ steps.token_check.outputs.expiry_date }}
          TOKEN_WARNING: ${{ steps.token_check.outputs.warning }}
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          DISPLAY_DATE=$(date -u +"%d %b %Y")

          REPO_ROWS=""
          for REPO_NAME in "bulk-pdf-extractor-and-generator" "student-doc-redactor"; do
            if [ "$REPO_NAME" = "bulk-pdf-extractor-and-generator" ]; then
              LABEL="Bulk PDF Extractor"
            else
              LABEL="Student Doc Redactor"
            fi

            # Today's views
            TODAY_VIEWS=$(jq -r --arg repo "$REPO_NAME" --arg d "$TODAY" \
              '(.[$repo].views[] | select(.date == $d) | .total) // 0' data/traffic.json)
            TODAY_VIEWS_U=$(jq -r --arg repo "$REPO_NAME" --arg d "$TODAY" \
              '(.[$repo].views[] | select(.date == $d) | .unique) // 0' data/traffic.json)

            # Today's clones
            TODAY_CLONES=$(jq -r --arg repo "$REPO_NAME" --arg d "$TODAY" \
              '(.[$repo].clones[] | select(.date == $d) | .total) // 0' data/traffic.json)
            TODAY_CLONES_U=$(jq -r --arg repo "$REPO_NAME" --arg d "$TODAY" \
              '(.[$repo].clones[] | select(.date == $d) | .unique) // 0' data/traffic.json)

            # Cumulative downloads
            DOWNLOADS=$(jq -r --arg repo "$REPO_NAME" \
              '(.[$repo].history | last | .total_downloads) // 0' data/releases.json)

            # All-time views
            TOTAL_VIEWS=$(jq -r --arg repo "$REPO_NAME" \
              '[.[$repo].views[].total] | add // 0' data/traffic.json)
            TOTAL_UNIQUE=$(jq -r --arg repo "$REPO_NAME" \
              '[.[$repo].views[].unique] | add // 0' data/traffic.json)

            # Stars
            STAR_COUNT=$(jq -r --arg repo "$REPO_NAME" \
              '(.[$repo].stars | last | .count) // 0' data/traffic.json)

            # 7-day view trend
            WEEK_AGO=$(date -u -d "7 days ago" +%Y-%m-%d 2>/dev/null || date -u -v-7d +%Y-%m-%d)
            TWO_WEEKS_AGO=$(date -u -d "14 days ago" +%Y-%m-%d 2>/dev/null || date -u -v-14d +%Y-%m-%d)
            THIS_WEEK=$(jq -r --arg repo "$REPO_NAME" --arg from "$WEEK_AGO" \
              '[.[$repo].views[] | select(.date >= $from) | .total] | add // 0' data/traffic.json)
            LAST_WEEK=$(jq -r --arg repo "$REPO_NAME" --arg from "$TWO_WEEKS_AGO" --arg to "$WEEK_AGO" \
              '[.[$repo].views[] | select(.date >= $from and .date < $to) | .total] | add // 0' data/traffic.json)

            TREND_HTML=""
            if [ "$LAST_WEEK" -gt 0 ] 2>/dev/null; then
              PCT=$(( (THIS_WEEK - LAST_WEEK) * 100 / LAST_WEEK ))
              if [ "$PCT" -ge 0 ]; then
                TREND_HTML="<span style=\"color:#3fb950;\">&#9650; +${PCT}%</span> vs last week"
              else
                TREND_HTML="<span style=\"color:#f85149;\">&#9660; ${PCT}%</span> vs last week"
              fi
            fi

            REPO_ROWS="${REPO_ROWS}
            <tr><td colspan=\"3\" style=\"padding:16px 0 8px 0;border-bottom:none;\">
              <strong style=\"font-size:16px;color:#e6edf3;\">${LABEL}</strong>
              <span style=\"color:#8b949e;font-size:13px;margin-left:8px;\">${STAR_COUNT} stars</span>
            </td></tr>
            <tr style=\"background:#161b22;\">
              <td style=\"padding:10px 14px;border-radius:6px 0 0 0;\">
                <div style=\"color:#8b949e;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;\">Views Today</div>
                <div style=\"font-size:22px;font-weight:700;color:#58a6ff;\">${TODAY_VIEWS}</div>
                <div style=\"color:#8b949e;font-size:12px;\">${TODAY_VIEWS_U} unique</div>
              </td>
              <td style=\"padding:10px 14px;\">
                <div style=\"color:#8b949e;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;\">Clones Today</div>
                <div style=\"font-size:22px;font-weight:700;color:#3fb950;\">${TODAY_CLONES}</div>
                <div style=\"color:#8b949e;font-size:12px;\">${TODAY_CLONES_U} unique</div>
              </td>
              <td style=\"padding:10px 14px;border-radius:0 6px 0 0;\">
                <div style=\"color:#8b949e;font-size:11px;text-transform:uppercase;letter-spacing:0.5px;\">Downloads</div>
                <div style=\"font-size:22px;font-weight:700;color:#d2a8ff;\">${DOWNLOADS}</div>
                <div style=\"color:#8b949e;font-size:12px;\">all time</div>
              </td>
            </tr>
            <tr style=\"background:#161b22;\">
              <td colspan=\"2\" style=\"padding:6px 14px 10px;border-radius:0 0 0 6px;color:#8b949e;font-size:12px;\">
                All-time views: ${TOTAL_VIEWS} (${TOTAL_UNIQUE} unique)
              </td>
              <td style=\"padding:6px 14px 10px;border-radius:0 0 6px 0;color:#8b949e;font-size:12px;text-align:right;\">
                ${TREND_HTML}
              </td>
            </tr>
            <tr><td colspan=\"3\" style=\"padding:4px;border-bottom:none;\"></td></tr>"
          done

          # Token warning banner
          TOKEN_BANNER=""
          if [ "$TOKEN_WARNING" = "true" ]; then
            TOKEN_BANNER="<tr><td colspan=\"3\" style=\"padding:12px 14px;background:#f8514922;border:1px solid #f85149;border-radius:6px;color:#f85149;font-size:13px;\">
              <strong>Token Expiry Warning</strong><br>
              Your GH_STATS_TOKEN expires on ${TOKEN_EXPIRY_DATE} (${TOKEN_DAYS_LEFT} days remaining).<br>
              <a href=\"https://github.com/settings/tokens\" style=\"color:#58a6ff;\">Rotate token</a> then
              <a href=\"https://github.com/mrdavearms/repo-stats/settings/secrets/actions\" style=\"color:#58a6ff;\">update the secret</a>.
            </td></tr>
            <tr><td colspan=\"3\" style=\"padding:4px;border-bottom:none;\"></td></tr>"
          fi

          # Build full HTML email body
          HTML_BODY="<!DOCTYPE html><html><body style=\"margin:0;padding:0;background:#0d1117;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;\"><table width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"background:#0d1117;padding:20px;\"><tr><td align=\"center\"><table width=\"600\" cellpadding=\"0\" cellspacing=\"0\" style=\"background:#0d1117;\"><tr><td style=\"padding:0 0 16px 0;border-bottom:1px solid #30363d;\"><span style=\"font-size:20px;font-weight:600;color:#e6edf3;\">Repo Stats</span><span style=\"float:right;color:#8b949e;font-size:13px;line-height:28px;\">${DISPLAY_DATE}</span></td></tr>${TOKEN_BANNER}${REPO_ROWS}<tr><td colspan=\"3\" style=\"padding:16px 0 0 0;text-align:center;\"><a href=\"https://mrdavearms.github.io/repo-stats/\" style=\"display:inline-block;padding:8px 20px;background:#58a6ff;color:#fff;text-decoration:none;border-radius:6px;font-size:13px;font-weight:600;\">View Dashboard</a></td></tr></table></td></tr></table></body></html>"

          # Assemble email with headers
          {
            printf 'From: Repo Stats <%s>\r\n' "$GMAIL_ADDRESS"
            printf 'To: %s\r\n' "$GMAIL_ADDRESS"
            printf 'Subject: Repo Stats %s\r\n' "$DISPLAY_DATE"
            printf 'MIME-Version: 1.0\r\n'
            printf 'Content-Type: text/html; charset=UTF-8\r\n'
            printf '\r\n'
            printf '%s' "$HTML_BODY"
          } > /tmp/email.txt

          # Send via Gmail SMTP
          curl -s --url "smtps://smtp.gmail.com:465" \
            --ssl-reqd \
            --mail-from "$GMAIL_ADDRESS" \
            --mail-rcpt "$GMAIL_ADDRESS" \
            --user "${GMAIL_ADDRESS}:${GMAIL_APP_PASSWORD}" \
            -T /tmp/email.txt

          echo "Email sent to $GMAIL_ADDRESS"
